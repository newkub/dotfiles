theme = "github_dark_dimmed"

[keys.normal]
# VS Code-like keybindings
C-z = "undo"
C-Z = "redo"
C-s = ":w"
C-S-s = ":wa"
C-q = ":q"
C-Q = ":qa"
C-f = "search"
# Note: Helix doesn't have built-in replace command like VS Code
# Use search (/) then c (change) or :search + editing
C-p = "file_picker"
C-b = "buffer_picker"
C-o = ":open"
C-n = ":new"
C-w = ":buffer-close"
C-W = ":buffer-close-others"
C-a = "select_all"
"C-/" = "toggle_line_comments"
"C-]" = "indent"
"C-[" = "unindent"
C-d = "delete_selection"
# Note: duplicate_line not available in Helix, use yy then p instead
C-up = "move_line_up"
C-down = "move_line_down"
tab = "move_next_word_end"
C-l = "goto_line"
C-g = "goto_line"
C-S-p = "command_palette"
C-S-f = "global_search"
C-S-l = "extend_line"
C-S-k = "extend_to_line_bounds"
C-S-a = "select_all"
C-k = "keep_primary_selection"
C-ret = "open_below"
C-S-ret = "open_above"
C-x = ":buffer-close"
C-t = ":sh"
C-e = ":sh explorer ."

[keys.insert]
# VS Code-like keybindings for insert mode
C-z = "undo"
C-Z = "redo"
C-s = ":w"
C-c = "normal_mode"
C-v = "paste_clipboard_before"
C-f = "search"
# Note: Helix doesn't have built-in replace command like VS Code
C-a = "goto_line_start"
C-e = "goto_line_end"
C-left = "move_prev_word_start"
C-right = "move_next_word_end"
C-home = "goto_file_start"
C-end = "goto_file_end"
"C-/" = "toggle_line_comments"
C-space = "completion"

[editor.statusline]
left = ["mode", "spacer", "spinner", "file-name", "file-modification-indicator", "read-only-indicator"]
center = ["version-control"]
right = ["diagnostics", "selections", "position", "total-line-numbers", "file-encoding", "file-line-ending", "file-type"]
separator = "▸"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.bufferline]
bufferline = "multiple"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = true
follow-symlinks = true
deduplicate-links = true
parents = true
ignore = true
git-ignore = true
git-global = true
git-exclude = true

[editor]
true-color = true
color-modes = true
rulers = [80, 120]
indent-guides.render = true
indent-guides.character = "│"
indent-guides.skip-levels = 1
completion-trigger-len = 2
auto-save = true
auto-format = true
popup-border = "popup"
auto-pairs = true

[editor.soft-wrap]
enable = true
wrap-at-text-width = false
wrap-indicator = "↪ "
max-wrap = 20
max-indent-retain = 80

[editor.whitespace.render]
space = "none"
tab = "all"
newline = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
tab = "→"
newline = "⏎"
tabpad = "·"