[tasks.update]
description = "update scoop, winget, bun(global), mise, rustup, gh extensions, chezmoi, proto, skills"
run = "scoop update && winget upgrade --all && bun update -g && bun upgrade && mise upgrade && mise self-update -y && mise reshim && rustup update stable && gh extension upgrade --all && chezmoi-update && proto upgrade && skills update"

[tasks.cleanup]
description = "cleanup scoop, mise, podman, git gc"
run = "scoop cleanup * && scoop cache rm * && cargo-clean-all && mise prune"


[tasks.commit]
description = "git add all && commit with czg ai"
run = "git add . && czg ai"



# chezmoi tasks
[tasks.chezmoi-update]
description = "chezmoi re-add (sync local changes)"
dir = "C:/Users/Veerapong/.local/share/chezmoi"
run = "chezmoi re-add"

[tasks.start-podman]
description = "start podman machine"
run = "podman machine start"

[tasks.stop-podman]
description = "stop podman machine"
run = "podman machine stop"




[tasks.cargo-clean-all]
description = "Clean all Rust projects recursively"
run_windows = """
powershell -NoProfile -Command "Get-ChildItem -Recurse -Filter Cargo.toml | ForEach-Object { `$dir = `$_.DirectoryName; Write-Host \\"Cleaning `$dir\\"; Push-Location `$dir; cargo clean; Pop-Location }"
"""


[tasks.git-submodule-update-remote]
description = "git submodule update with init and recursive"
run = "git submodule update --init --recursive"



[tasks.create-nuxt]
description = "nuxt minimal"
run = "bun create nuxt --template minimal --packageManager bun --force --gitInit"

[tasks.update-node-deps]
description = "bunx taze -r -w"
run = "bunx taze -r -w"

[tasks.remove-node-modules]
description = "remove node_modules recursive"
run = "Get-ChildItem -Directory -Recurse -Filter node_modules | Remove-Item -Recurse -Force"


[tasks.remove-target]
description = "remove target recursive"
run = "Get-ChildItem -Directory -Recurse -Filter target | Remove-Item -Recurse -Force"





