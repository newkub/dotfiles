[tasks.update]
description = "update all tools"
shell = "pwsh -Command"
run = "winget source update && scoop update && winget upgrade --all && bun update -g && bun upgrade && uv self update && uv tool upgrade --all && mise upgrade && mise self-update -y && mise reshim && rustup update stable && gh extension upgrade --all && chezmoi-update && skills update"

[tasks.cleanup]
description = "cleanup caches"
shell = "pwsh -Command"
run = "scoop cleanup * && scoop cache rm * && Remove-Item -Recurse -Force $env:USERPROFILE/.bun/install/cache/* -ErrorAction SilentlyContinue && Get-ChildItem -Directory -Recurse -Filter node_modules -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue && cargo-clean-all ; podman system prune -af 2>$null ; mise prune --yes ; git gc --auto 2>$null ; exit 0"

[tasks.audit]
description = "security audit"
shell = "pwsh -Command"
run = "bun audit && cargo audit && gitleaks detect"

[tasks.doctor]
description = "check toolchain health"
shell = "pwsh -Command"
run = "mise doctor && git --version && bun --version && rustc --version && cargo --version && node --version && podman --version"

[tasks.commit]
description = "git add and commit"
shell = "pwsh -Command"
run = "git add . && aicommits"


# chezmoi tasks
[tasks.chezmoi-update]
description = "sync local dotfiles"
dir = "C:/Users/Veerapong/.local/share/chezmoi"
shell = "pwsh -Command"
run = "chezmoi re-add"

[tasks.start-podman]
description = "start podman machine"
shell = "pwsh -Command"
run = "podman machine start"

[tasks.stop-podman]
description = "stop podman machine"
shell = "pwsh -Command"
run = "podman machine stop"


[tasks.cargo-clean-all]
description = "Clean all Rust projects recursively"
shell = "pwsh -Command"
run_windows = "powershell -NoProfile -Command \"Get-ChildItem -Recurse -Filter Cargo.toml | ForEach-Object { `$dir = `$_.DirectoryName; Write-Host \\\\\"Cleaning `$dir\\\\\"; Push-Location `$dir; cargo clean; Pop-Location }\""



[tasks.create-nuxt]
description = "nuxt minimal"
shell = "pwsh -Command"
run = "bun create nuxt --template minimal --packageManager bun --force --gitInit"

[tasks.update-node-deps]
description = "update project dependencies"
shell = "pwsh -Command"
run = "bunx taze -r -w && bun install"

[tasks.remove-node-modules]
description = "remove node_modules recursive"
shell = "pwsh -Command"
run = "Get-ChildItem -Directory -Recurse -Filter node_modules | Remove-Item -Recurse -Force"

[tasks.remove-target]
description = "remove target recursive"
shell = "pwsh -Command"
run = "Get-ChildItem -Directory -Recurse -Filter target | Remove-Item -Recurse -Force"


